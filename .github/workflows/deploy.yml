name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  [cite_start]pull_request: # Trigger on PRs as required [cite: 10, 45]
    branches: [ main ]

jobs:
  [cite_start]ci-checks: # Requirement 2: Install, Test, and Lint [cite: 11, 12, 13, 14]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Lint and Test Client
        working-directory: ./client
        run: |
          npm ci
          npm run lint # Requirement 7 [cite: 46]
      
      - name: Test Server
        working-directory: ./server
        run: |
          npm ci
          npm test # Requirement 4 & 5 [cite: 25, 29]

  deploy:
    needs: ci-checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - [cite_start]name: SSH into EC2 and Deploy # Requirement 9 [cite: 72]
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: bash /home/ubuntu/Shopsmart/deploy.sh
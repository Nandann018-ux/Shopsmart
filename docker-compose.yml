version: '3.8'

services:
  urbangear-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
    restart: unless-stopped

  urbangear-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - urbangear-server
    restart: unless-stopped
